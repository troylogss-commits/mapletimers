<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sol Janus Timer</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Trebuchet MS', sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #34104f 0%, #090512 60%),
        #05030a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 30px;
    }

    .app-shell {
      width: 1400px;
      border: 2px solid rgba(255, 185, 80, 0.3);
      border-radius: 24px;
      background: rgba(5, 5, 18, 0.94);
      box-shadow:
        0 0 50px rgba(128, 0, 255, 0.18),
        inset 0 0 40px rgba(255,255,255,0.03);
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 24px;
      font-size: 4rem;
      font-weight: bold;
      color: #ffd76b;
      letter-spacing: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      text-shadow:
        0 0 16px rgba(255,215,107,0.45),
        0 0 40px rgba(255,170,0,0.25);
      background:
        linear-gradient(180deg, rgba(255,180,60,0.06), transparent);
    
    }

    .timers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 26px;
      padding: 30px;
    }

    .timer-box {
      position: relative;
      border-radius: 26px;
      padding: 28px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.35);
      min-height: 720px;
      backdrop-filter: blur(8px);
    }

    .timer-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.05), transparent 25%);
      pointer-events: none;
    
    }

    .timer-box.sol {
      background:
        radial-gradient(circle at center, rgba(158, 55, 255, 0.25), transparent 60%),
        linear-gradient(180deg, rgba(35,0,70,0.95), rgba(10,5,25,0.98));
      border-color: rgba(203, 118, 255, 0.55);
      box-shadow: 0 0 30px rgba(174, 74, 255, 0.25);
    }

    .timer-box.fatal {
      background:
        radial-gradient(circle at center, rgba(255, 0, 60, 0.2), transparent 60%),
        linear-gradient(180deg, rgba(65,0,10,0.96), rgba(15,0,0,0.98));
      border-color: rgba(255, 92, 92, 0.45);
      box-shadow: 0 0 30px rgba(255, 0, 80, 0.18);
    }

    .panel-title {
      text-align: center;
      font-size: 4rem;
      font-weight: bold;
      letter-spacing: 2px;
      margin-top: 10px;
      margin-bottom: 24px;
    }

    .sol .panel-title {
      color: #f3d2ff;
      text-shadow: 0 0 18px rgba(196, 90, 255, 0.8);
    }

    .fatal .panel-title {
      color: #ff8e8e;
      text-shadow: 0 0 18px rgba(255, 80, 80, 0.8);
    }

    .icon-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .sol-icon {
      width: 180px;
      height: 180px;
      image-rendering: pixelated;
      border-radius: 22px;
      border: 4px solid rgba(255,255,255,0.12);
      box-shadow:
        0 0 25px rgba(255,255,255,0.18),
        0 0 55px rgba(180, 90, 255, 0.5);
    }

    .fatal .sol-icon {
      box-shadow:
        0 0 25px rgba(255,255,255,0.1),
        0 0 55px rgba(255, 40, 40, 0.45);
    }

    .mini-label {
      width: fit-content;
      margin: 0 auto;
      padding: 10px 22px;
      border-radius: 999px;
      font-size: 1.2rem;
      margin-bottom: 18px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.35);
    }

    .countdown {
      text-align: center;
      font-size: 8rem;
      font-weight: bold;
      margin-top: 20px;
      letter-spacing: 4px;
      text-shadow:
        0 0 25px rgba(255,255,255,0.35),
        0 0 60px rgba(255,255,255,0.15);
      animation: glowPulse 2.4s infinite ease-in-out;
    
    }

    .sol .countdown {
      color: #f7e7ff;
    }

    .fatal .countdown {
      color: #ffe2e2;
    }

    .bar {
      height: 10px;
      border-radius: 999px;
      margin: 34px 0 20px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 100%;
    }

    .sol .fill {
      background: linear-gradient(90deg, #c45fff, #8f38ff);
      box-shadow: 0 0 15px rgba(181, 83, 255, 0.7);
    }

    .fatal .fill {
      background: linear-gradient(90deg, #ff4343, #ff1744);
      box-shadow: 0 0 15px rgba(255, 60, 60, 0.7);
    }

    .repeat {
      text-align: center;
      font-size: 1.3rem;
      letter-spacing: 2px;
      opacity: 0.9;
      margin-bottom: 34px;
    }

    .controls {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 26px;
    }

    button {
      border: none;
      padding: 18px 28px;
      min-width: 160px;
      border-radius: 18px;
      font-size: 1.25rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      color: white;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
    }

    button:hover {
      transform: translateY(-2px) scale(1.02);
    }

    .sol button:hover {
      box-shadow: 0 0 18px rgba(176, 72, 255, 0.35);
    }

    .fatal button:hover {
      box-shadow: 0 0 18px rgba(255, 40, 40, 0.35);
    }

    .bottom-panel {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 28px;
      display: flex;
      justify-content: center;
      gap: 24px;
    }

    select {
      width: 260px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 1rem;
    }

    @keyframes glowPulse {
      0% {
        transform: scale(1);
        opacity: 0.92;
      }

      50% {
        transform: scale(1.02);
        opacity: 1;
      }

      100% {
        transform: scale(1);
        opacity: 0.92;
      }
    }

    @media (max-width: 1200px) {
      .timers {
        grid-template-columns: 1fr;
      }

      .app-shell {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="app-shell">
  <div class="header">ABILITY TIMER</div>

  <div class="timers">

    <div class="timer-box sol">
      <div class="panel-title">SOL JANUS</div>

      <div class="icon-wrapper">
        <img
          id="solIcon"
          class="sol-icon"
          src="./sol_janus_icon.png"
          alt="Sol Janus Icon"
        >
      </div>

      <div class="mini-label">⏳ 1:50</div>

      <div class="countdown" id="countdown">01:50</div>

      <div class="bar"><div class="fill"></div></div>

      <div class="repeat">↻ REPEATING</div>

      <div class="controls">
        <button onclick="startTimer()">▶ START</button>
        <button onclick="stopTimer()">■ STOP</button>
        <button onclick="resetTimer()">↻ RESET</button>
      </div>

      <div class="controls">
        <button onclick="setMode('sol')">SOL JANUS</button>
        <button onclick="setMode('fatal')">FATAL STRIKE</button>
      </div>
    </div>

    <div class="timer-box fatal">
      <div class="panel-title">FATAL STRIKE</div>

      <div class="icon-wrapper">
        <img
          id="fatalIcon"
          class="sol-icon"
          src="./fatal_strike_icon.png"
          alt="Fatal Strike Icon"
        >
      </div>

      <div class="mini-label">⏳ 0:30</div>

      <div class="countdown">00:30</div>

      <div class="bar"><div class="fill"></div></div>

      <div class="repeat">↻ REPEATING</div>
    </div>
  </div>

  <div class="bottom-panel">
    <select id="alertType">
      <option value="ring">🔔 Ring</option>
      <option value="bell">🛎 Bell</option>
      <option value="alarm">🚨 Alarm</option>
      <option value="beep">📢 Beep</option>
      <option value="silent">⚡ Silent Flash Only</option>
    </select>
  </div>
</div>

<script>
  let totalSeconds = 110;
  let currentMode = 'sol';
  let currentSeconds = totalSeconds;
  let timer = null;

  function updateDisplay() {
    const minutes = Math.floor(currentSeconds / 60);
    const seconds = currentSeconds % 60;

    document.getElementById("countdown").textContent =
      `${minutes}:${seconds.toString().padStart(2, '0')}`;
  }

  function playRing() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const frequencies = [880, 1175, 1568];

    frequencies.forEach((freq, index) => {
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      oscillator.type = "sine";
      oscillator.frequency.value = freq;

      const startTime = audioCtx.currentTime + (index * 0.18);

      gainNode.gain.setValueAtTime(0.2, startTime);
      gainNode.gain.exponentialRampToValueAtTime(
        0.0001,
        startTime + 0.5
      );

      oscillator.start(startTime);
      oscillator.stop(startTime + 0.5);
    });
  }

  function playBell() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    [660, 880].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.frequency.value = freq;
      osc.type = 'triangle';

      const start = audioCtx.currentTime + i * 0.25;

      gain.gain.setValueAtTime(0.25, start);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.6);

      osc.start(start);
      osc.stop(start + 0.6);
    });
  }

  function playAlarm() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    for (let i = 0; i < 6; i++) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.type = 'square';
      osc.frequency.value = i % 2 === 0 ? 750 : 950;

      const start = audioCtx.currentTime + i * 0.15;

      gain.gain.setValueAtTime(0.18, start);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.14);

      osc.start(start);
      osc.stop(start + 0.14);
    }
  }

  function playBeep() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.type = 'sine';
    osc.frequency.value = 1000;

    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
  }

  function playSelectedAlert() {
    const selected = document.getElementById('alertType').value;

    switch (selected) {
      case 'ring':
        playRing();
        break;
      case 'bell':
        playBell();
        break;
      case 'alarm':
        playAlarm();
        break;
      case 'beep':
        playBeep();
        break;
      case 'silent':
        break;
    }
  }

  function flashScreen() {
    document.body.animate(
      [
        { filter: 'brightness(1)' },
        { filter: 'brightness(1.6)' },
        { filter: 'brightness(1)' }
      ],
      {
        duration: 700
      }
    );
  }

  function setMode(mode) {
    currentMode = mode;

    if (mode === 'sol') {
      totalSeconds = 110;
      currentSeconds = totalSeconds;
      document.getElementById('countdown').textContent = '01:50';
    }

    if (mode === 'fatal') {
      totalSeconds = 30;
      currentSeconds = totalSeconds;
      document.getElementById('countdown').textContent = '00:30';
    }

    updateDisplay();
  }

  function startTimer() {
    if (timer) return;

    timer = setInterval(() => {
      currentSeconds--;
      updateDisplay();

      if (currentSeconds <= 0) {
        playSelectedAlert();
        flashScreen();
        if (currentMode === 'sol') {
          alert('Sol Janus Ready!');
        } else {
          alert('Fatal Strike Ready!');
        }

        currentSeconds = totalSeconds;
        updateDisplay();
      }
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timer);
    timer = null;
  }

  function resetTimer() {
    stopTimer();
    currentSeconds = totalSeconds;
    updateDisplay();
  }

  updateDisplay();
</script>

</body>
</html>
